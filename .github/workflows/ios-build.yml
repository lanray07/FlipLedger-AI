name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build FlipLedger AI
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.4.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List schemes
        run: |
          xcodebuild -list -project FlipLedgerAI.xcodeproj

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -quiet \
            -project FlipLedgerAI.xcodeproj \
            -scheme FlipLedgerAI \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-derived-data
          path: build/DerivedData/Logs
          if-no-files-found: ignore
